name: "4 · Infrastructure Tests"

# ─────────────────────────────────────────────────────────────────
# TRIGGERS
# ─────────────────────────────────────────────────────────────────
# Unit tests and OPA regression tests run on both PRs and pushes to
# main so you catch regressions before AND after merge.
#
# Integration tests (real AWS) only run after a push to main — never
# on PRs — because they deploy actual resources and cost money.
on:
  pull_request:
    branches:
      - main
    paths:
      - "modules/**"
      - "environments/**"
      - "policies/**"
      - "tests/**"
      - ".github/workflows/04-infra-tests.yml"

  push:
    branches:
      - main
    paths:
      - "modules/**"
      - "environments/**"
      - "policies/**"
      - "tests/**"
      - ".github/workflows/04-infra-tests.yml"

# ─────────────────────────────────────────────────────────────────
# SHARED CONSTANTS
# ─────────────────────────────────────────────────────────────────
env:
  GO_VERSION: "1.22"
  CONFTEST_VERSION: "0.63.0"
  TF_VERSION: "1.9.8"

# Prevent concurrent test runs from competing for the same state lock.
# cancel-in-progress: true is safe for tests (unlike apply) because
# tests either use plan-only (no state) or deploy+destroy in isolation.
concurrency:
  group: infra-tests-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────
jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Unit tests (plan-only, no real AWS calls)
  #
  # Covers: TC-VPC-01..06, TC-EC2-01..05, TC-RDS-01..05
  # Uses mock AWS credentials — Terraform needs them to initialise
  # the AWS provider but never makes a real API call during plan-only.
  # ──────────────────────────────────────────────────────────────
  unit-tests:
    name: "🧪 Unit Tests (plan-only)"
    runs-on: ubuntu-latest

    steps:

      - name: "Checkout repository"
        uses: actions/checkout@v4

      # Go cache: cache-dependency-path must point to go.sum, not go.mod.
      # go.sum is the file whose hash changes when dependencies change.
      # If go.sum does not yet exist, run `go mod tidy` locally and commit it.
      - name: "Setup Go ${{ env.GO_VERSION }}"
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: tests/go.sum   # ← must be go.sum, not go.mod

      - name: "Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # terraform_wrapper: false so Terratest can call the binary
          # directly and capture its exit codes without the wrapper
          # intercepting them.
          terraform_wrapper: false

      # Mock credentials: the AWS provider requires credentials to
      # initialise even when no real API calls are made.
      # The values "mock" / "us-east-1" are intentionally fake.
      - name: "Set mock AWS credentials"
        run: |
          echo "AWS_ACCESS_KEY_ID=mock"          >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=mock"       >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=eu-west-2"     >> $GITHUB_ENV

      - name: "Download Go modules"
        working-directory: tests
        run: go mod download

      # Run each module's tests as a separate step so failures are
      # clearly attributed to the correct module in the Actions UI.
      - name: "Run VPC unit tests"
        working-directory: tests
        run: |
          go test -v -timeout 10m \
            -run TestVpc \
            ./unit/... 2>&1 | tee vpc_test_results.txt

      - name: "Run EC2 unit tests"
        working-directory: tests
        run: |
          go test -v -timeout 10m \
            -run TestEc2 \
            ./unit/... 2>&1 | tee ec2_test_results.txt

      - name: "Run RDS unit tests"
        working-directory: tests
        run: |
          go test -v -timeout 10m \
            -run TestRds \
            ./unit/... 2>&1 | tee rds_test_results.txt

      - name: "Upload unit test results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.sha }}
          retention-days: 14
          # All three result files in one artifact.
          path: |
            tests/vpc_test_results.txt
            tests/ec2_test_results.txt
            tests/rds_test_results.txt

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — OPA policy regression tests
  #
  # Covers: TC-OPA-01..07
  # These run opa test against the .rego test files in tests/ to
  # verify that policy rules accept compliant plans and reject
  # violations — no AWS credentials required.
  # ──────────────────────────────────────────────────────────────
  opa-regression-tests:
    name: "🔐 OPA Policy Regression Tests"
    runs-on: ubuntu-latest

    steps:

      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Go ${{ env.GO_VERSION }}"
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: tests/go.sum

      # Install Conftest to run the OPA tests.
      # Pinned to a specific version so CI is reproducible.
      - name: "Install Conftest ${{ env.CONFTEST_VERSION }}"
        run: |
          wget -q \
            https://github.com/open-policy-agent/conftest/releases/download/v${{ env.CONFTEST_VERSION }}/conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz
          tar xzf conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: "Download Go modules"
        working-directory: tests
        run: go mod download

      # Run the Rego unit tests directly with `opa test`.
      # These verify that allow/deny rules behave as expected
      # without requiring a real Terraform plan.
      - name: "Run OPA unit tests (opa test)"
        run: |
          conftest verify \
            --policy policies \
            --policy tests \
            --no-color 2>&1 | tee tests/opa_test_results.txt

      # Also run any Go-based OPA regression tests (TestOpa* functions).
      - name: "Run OPA regression tests (Go)"
        working-directory: tests
        run: |
          go test -v -timeout 5m \
            -run TestOpa \
            ./unit/... 2>&1 | tee opa_go_test_results.txt

      - name: "Upload OPA test results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opa-test-results-${{ github.sha }}
          retention-days: 14
          path: |
            tests/opa_test_results.txt
            tests/opa_go_test_results.txt

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — Integration tests (deploy real AWS resources)
  #
  # Runs ONLY on push to main, after unit and OPA tests pass.
  # Deploys a temporary dev environment, asserts runtime state,
  # then destroys everything — even on test failure (t.Cleanup).
  #
  # Uses the same AWS secrets as the deploy workflow.
  # The integration tests use a distinct project_name so they never
  # touch the same resources as the real dev deployment.
  # ──────────────────────────────────────────────────────────────
  integration-tests:
    name: "🌍 Integration Tests (real AWS)"
    runs-on: ubuntu-latest
    needs: [unit-tests, opa-regression-tests]

    # Guard: only run on push to main, never on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # ─── APPROVAL GATE ──────────────────────────────────────────────
    # Uncomment the line below AFTER creating an "integration" environment
    # in Repository Settings → Environments.
    # The extension flags unknown environment names, so keep this commented
    # until the environment exists in your repository settings.
    #
    #   environment: integration
    #
    # ────────────────────────────────────────────────────────────────

    steps:

      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Go ${{ env.GO_VERSION }}"
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: tests/go.sum

      - name: "Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Real AWS credentials for integration tests.
      # These are the same long-lived keys stored in repository secrets.
      - name: "Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: "Download Go modules"
        working-directory: tests
        run: go mod download

      # Run the integration test suite.
      # t.Cleanup() inside the test guarantees `terraform destroy` is
      # called even if assertions fail or the test panics.
      # Timeout is 60m because RDS provisioning can take 10–15 minutes.
      - name: "Run integration tests"
        working-directory: tests
        run: |
          go test -v -timeout 60m \
            -run TestDevEnvironment \
            ./integration/... 2>&1 | tee integration_test_results.txt
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

      - name: "Upload integration test results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ github.sha }}
          retention-days: 30
          path: tests/integration_test_results.txt

  # ──────────────────────────────────────────────────────────────
  # JOB 4 — Test result summary
  #
  # Posts a consolidated pass/fail table as a PR comment so
  # engineers see test results without opening the Actions tab.
  # Runs only on pull_request events (not on push to main).
  # ──────────────────────────────────────────────────────────────
  test-summary:
    name: "📋 Test Summary"
    runs-on: ubuntu-latest
    needs: [unit-tests, opa-regression-tests]

    # Run even if upstream jobs failed so the comment always appears.
    if: always() && github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:

      - name: "Download unit test results"
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results-${{ github.sha }}
          path: results/unit
        # continue-on-error so the summary posts even if unit tests
        # were skipped or the artifact upload failed.
        continue-on-error: true

      - name: "Download OPA test results"
        uses: actions/download-artifact@v4
        with:
          name: opa-test-results-${{ github.sha }}
          path: results/opa
        continue-on-error: true

      - name: "Post test summary as PR comment"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const readSafe = (p) => {
              try   { return fs.readFileSync(p, 'utf8').slice(0, 20000); }
              catch { return '(no output — test may have been skipped)'; }
            };

            const vpc  = readSafe('results/unit/vpc_test_results.txt');
            const ec2  = readSafe('results/unit/ec2_test_results.txt');
            const rds  = readSafe('results/unit/rds_test_results.txt');
            const opa  = readSafe('results/opa/opa_test_results.txt');
            const opaGo = readSafe('results/opa/opa_go_test_results.txt');

            // A suite passes only if it contains PASS and does NOT contain FAIL.
            const passed = (text) =>
              text.includes('PASS') && !text.includes('FAIL') ? '✅ PASS' : '❌ FAIL';

            const unitStatus = '${{ needs.unit-tests.result }}';
            const opaStatus  = '${{ needs.opa-regression-tests.result }}';

            const marker = '<!-- test-summary -->';

            const body = [
              marker,
              '## 📋 Infrastructure Test Results',
              '',
              `| Suite | Status |`,
              `|---|---|`,
              `| VPC Module Unit Tests   | ${passed(vpc)}  |`,
              `| EC2 Module Unit Tests   | ${passed(ec2)}  |`,
              `| RDS Module Unit Tests   | ${passed(rds)}  |`,
              `| OPA Policy Tests (Rego) | ${passed(opa)}  |`,
              `| OPA Regression Tests (Go) | ${passed(opaGo)} |`,
              '',
              `> Unit job: **${unitStatus}** · OPA job: **${opaStatus}**`,
              `> Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              '',
              '<details><summary>VPC Tests</summary>\n\n```\n' + vpc + '\n```\n</details>',
              '<details><summary>EC2 Tests</summary>\n\n```\n' + ec2 + '\n```\n</details>',
              '<details><summary>RDS Tests</summary>\n\n```\n' + rds + '\n```\n</details>',
              '<details><summary>OPA Policy Tests (Rego)</summary>\n\n```\n' + opa + '\n```\n</details>',
              '<details><summary>OPA Regression Tests (Go)</summary>\n\n```\n' + opaGo + '\n```\n</details>',
            ].join('\n');

            // Update the existing summary comment if one exists,
            // instead of creating a new one on every push to the PR.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }