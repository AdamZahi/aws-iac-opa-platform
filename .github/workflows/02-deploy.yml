name: "2 · Terraform Apply"

# ── Triggers ────────────────────────────────────────────────────
# Runs only when code is merged / pushed directly to main.
# US 3.1: "Le pipeline déploie l'infrastructure lors d'un merge sur main."
on:
  push:
    branches:
      - main
    paths:
      - "environments/**"
      - "modules/**"
      - "policies/**"

# ── Shared constants ────────────────────────────────────────────
env:
  TF_VERSION:     "1.9.8"
  TF_WORKING_DIR: environments/dev

# Only one deploy can run at a time on main — prevents concurrent state writes
concurrency:
  group: deploy-main
  cancel-in-progress: false   # Never cancel an in-flight apply; queue instead

# ── Job ─────────────────────────────────────────────────────────
jobs:
  apply:
    name: "Apply"
    runs-on: ubuntu-latest
    #environment: prod

    permissions:
      contents: read

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # ── Setup ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform & AWS
        uses: ./.github/actions/setup-terraform
        with:
          terraform-version:    ${{ env.TF_VERSION }}
          aws-access-key-id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:           ${{ secrets.AWS_REGION }}
          lock-timeout:         "120s"    # Longer timeout for apply

      # ── Download the validated plan ────────────────────────────
      # We apply the exact binary produced by the validate workflow —
      # no re-plan, so what was OPA-approved is what gets deployed.
      - name: Download validated plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}

      # ── Apply ──────────────────────────────────────────────────
      - name: Terraform Apply
        run: |
          terraform apply \
            -input=false \
            -lock-timeout=120s \
            -auto-approve \
            tfplan
        env:
          TF_VAR_environment: dev

      # ── Post-apply outputs ─────────────────────────────────────
      - name: Capture Terraform outputs
        run: terraform output -json > tf_outputs.json

      - name: Upload apply outputs
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs-${{ github.sha }}
          retention-days: 7
          path: ${{ env.TF_WORKING_DIR }}/tf_outputs.json
