name: Terraform CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - "environments/**"
      - "modules/**"
      - "policies/**"

  push:
    branches:
      - main
    paths:
      - "environments/**"
      - "modules/**"
      - "policies/**"

  # US 3.2 – Scheduled drift detection (daily at 06:00 UTC)
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev | staging | prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

# ─────────────────────────────────────────────────────────────
# Global environment variables
# ─────────────────────────────────────────────────────────────
env:
  TF_VERSION: "1.9.8"                          # Terraform version pinned for reproducibility
  CONFTEST_VERSION: "0.63.0"                   # OPA/Conftest version
  TF_WORKING_DIR: environments/dev             # Default environment; overridden per job when needed
  AWS_REGION: ${{ secrets.AWS_REGION }}

# Cancel in-flight runs on the same branch to avoid state-lock races (Bug 1)
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# JOB 1 – Validate (runs on every PR and push)
# ─────────────────────────────────────────────────────────────
jobs:
  validate:
    name: "🔍 Terraform Validate & OPA"
    runs-on: ubuntu-latest

    # Only skip for scheduled drift-detection runs
    if: github.event_name != 'schedule'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    # Emit a GitHub Step Summary with the plan output
    permissions:
      contents: read
      pull-requests: write      # Allows posting plan as PR comment

    steps:
      # ── 1. Source code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Terraform toolchain ──────────────────────────────
      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true   # Keeps exit codes for plan/apply

      # ── 3. AWS credentials ──────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 4. Terraform Init (remote backend: S3 + DynamoDB) ───
      - name: Terraform Init
        run: terraform init -input=false
        env:
          # Prevent state-lock timeout from stalling the pipeline (Bug 1)
          TF_CLI_ARGS_init: "-lock-timeout=60s"

      # ── 5. Formatting check ─────────────────────────────────
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: false   # Fail fast on formatting issues

      # ── 6. Validate HCL syntax ──────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── 7. Terraform Plan (saved as binary + JSON) ──────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -lock-timeout=60s \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt
        env:
          TF_VAR_environment: dev

      # ── 8. Export plan as JSON for OPA analysis ─────────────
      - name: Terraform Show JSON
        run: terraform show -json tfplan > tfplan.json

      # ── 9. Install Conftest (OPA runner) ────────────────────
      - name: Install Conftest ${{ env.CONFTEST_VERSION }}
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v${{ env.CONFTEST_VERSION }}/conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz
          tar xzf conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      # ── 10. Run OPA / Conftest policies ─────────────────────
      #   US 2.1 – At least 3 security rules enforced:
      #     · s3_public.rego   – no public S3 buckets
      #     · iam_wildcard.rego – no Action:"*" (US 2.2)
      #     · ssh_open.rego    – no SSH 0.0.0.0/0
      #   US 3.1 – Deployment is BLOCKED if OPA fails
      - name: Run OPA Policies
        id: opa
        run: |
          conftest test tfplan.json \
            --policy ../../policies \
            --output table \
            --no-color 2>&1 | tee opa_output.txt
          # Exit code propagated: non-zero blocks the pipeline

      # ── 11. Post plan + OPA result as PR comment ────────────
      - name: Post PR comment with plan summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8').slice(0, 60000);
            const opa  = fs.readFileSync('${{ env.TF_WORKING_DIR }}/opa_output.txt', 'utf8').slice(0, 10000);
            const body = [
              '## 🏗️ Terraform Plan Summary',
              '```hcl',
              plan,
              '```',
              '',
              '## 🔐 OPA Policy Results',
              '```',
              opa,
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      # ── 12. Upload artifacts for the apply job ──────────────
      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          retention-days: 1
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/tfplan.json
            ${{ env.TF_WORKING_DIR }}/plan_output.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 2 – Apply (runs only on push/merge to main, after validate)
  # US 3.1 – Deploy on merge; blocked if OPA failed
  # ─────────────────────────────────────────────────────────────
  apply:
    name: "🚀 Terraform Apply"
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production    # Requires manual approval gate in GitHub Settings

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Re-initialise (fresh runner has no local state)
      - name: Terraform Init
        run: terraform init -input=false
        env:
          TF_CLI_ARGS_init: "-lock-timeout=60s"

      # Download the validated plan binary from the validate job
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}

      # Apply the exact plan that was validated + OPA-approved
      - name: Terraform Apply
        run: |
          terraform apply \
            -input=false \
            -lock-timeout=120s \
            -auto-approve \
            tfplan
        env:
          TF_VAR_environment: dev

      # Emit outputs for downstream steps / notifications
      - name: Capture Terraform Outputs
        run: terraform output -json > tf_outputs.json

      - name: Upload apply outputs
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs-${{ github.sha }}
          retention-days: 7
          path: ${{ env.TF_WORKING_DIR }}/tf_outputs.json

  # ─────────────────────────────────────────────────────────────
  # JOB 3 – Drift Detection (US 3.2)
  # Runs daily via cron OR on manual dispatch
  # ─────────────────────────────────────────────────────────────
  drift-detection:
    name: "📡 Drift Detection"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    permissions:
      contents: read
      issues: write     # Allows opening a GitHub Issue on drift

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false
        env:
          TF_CLI_ARGS_init: "-lock-timeout=60s"

      # Refresh state against real AWS resources and capture exit code
      - name: Terraform Plan – Drift Check
        id: drift
        run: |
          terraform plan \
            -input=false \
            -lock-timeout=60s \
            -refresh=true \
            -detailed-exitcode \
            -no-color 2>&1 | tee drift_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        # Exit codes: 0 = no changes, 1 = error, 2 = changes detected (drift)
        continue-on-error: true

      # Open a GitHub Issue when drift is detected (exit code 2)
      - name: Open GitHub Issue on Drift
        if: steps.drift.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const drift = fs.readFileSync('${{ env.TF_WORKING_DIR }}/drift_output.txt', 'utf8').slice(0, 60000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Infrastructure Drift Detected – ${new Date().toISOString().split('T')[0]}`,
              labels: ['drift', 'infrastructure', 'alert'],
              body: [
                '## ⚠️ Drift Detected',
                '',
                'A scheduled Terraform plan detected differences between the IaC state and the actual AWS infrastructure.',
                'Manual changes may have been made outside of the CI/CD pipeline.',
                '',
                '**Action Required:** Review the diff below and either:',
                '- Run `terraform apply` to reconcile, OR',
                '- Update the IaC code to reflect intentional changes.',
                '',
                '```hcl',
                drift,
                '```',
                '',
                `> Detected at: ${new Date().toISOString()}`,
              ].join('\n'),
            });

      # Notify via Slack when drift is detected (optional – add SLACK_WEBHOOK secret)
      - name: Slack notification on Drift
        if: steps.drift.outputs.exit_code == '2' && secrets.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚨 *Infrastructure Drift Detected* on `${{ github.repository }}`!\nA manual change was made outside of Terraform. Review the open GitHub Issue for details.",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                    { "title": "Detected at", "value": "${{ github.run_started_at }}", "short": true }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          retention-days: 30
          path: ${{ env.TF_WORKING_DIR }}/drift_output.txt

      # Fail the job explicitly so the GitHub Actions UI shows red on drift
      - name: Fail job on detected drift
        if: steps.drift.outputs.exit_code == '2'
        run: |
          echo "::error::Infrastructure drift detected. See the uploaded report and the GitHub Issue."
          exit 1