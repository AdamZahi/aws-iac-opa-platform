name: Terraform CI/CD

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

env:
  TF_VERSION: "1.13.1"
  TF_WORKING_DIR: environments/dev

jobs:

  validate:

    name: Terraform Validation

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

        with:
          terraform_version: ${{ env.TF_VERSION }}


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          aws-region: ${{ secrets.AWS_REGION }}


      - name: Terraform Init
        run: terraform init


      - name: Terraform Format Check
        run: terraform fmt -check -recursive


      - name: Terraform Validate
        run: terraform validate


      - name: Terraform Plan
        run: terraform plan -out=tfplan


      ############################
      # OPA / Conftest Validation
      ############################

      - name: Install Conftest
        run: |

          wget https://github.com/open-policy-agent/conftest/releases/download/v0.63.0/conftest_0.63.0_Linux_x86_64.tar.gz

          tar xzf conftest_0.63.0_Linux_x86_64.tar.gz

          sudo mv conftest /usr/local/bin/


      - name: Terraform Show JSON
        run: terraform show -json tfplan > tfplan.json


      - name: Run OPA Policies
        run: |

          conftest test tfplan.json \
          --policy ../../policies


      - name: Upload plan artifact

        uses: actions/upload-artifact@v4

        with:

          name: tfplan

          path: |

            ${{ env.TF_WORKING_DIR }}/tfplan

            ${{ env.TF_WORKING_DIR }}/tfplan.json



  apply:

    name: Terraform Apply

    needs: validate

    if: github.event_name == 'push'

    runs-on: ubuntu-latest


    defaults:

      run:

        working-directory: ${{ env.TF_WORKING_DIR }}


    steps:

      - name: Checkout repository

        uses: actions/checkout@v4


      - name: Setup Terraform

        uses: hashicorp/setup-terraform@v3

        with:

          terraform_version: ${{ env.TF_VERSION }}


      - name: Configure AWS credentials

        uses: aws-actions/configure-aws-credentials@v4

        with:

          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}

          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          aws-region: ${{ secrets.AWS_REGION }}


      - name: Terraform Init

        run: terraform init


      - name: Terraform Apply

        run: terraform apply -auto-approve