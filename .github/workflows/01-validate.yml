name: "1 · Terraform Validate & OPA"

# ── Triggers ────────────────────────────────────────────────────
# Runs on every Pull Request targeting main.
# Only watches paths that affect infrastructure or policies.
on:
  pull_request:
    branches:
      - main
    paths:
      - "environments/**"
      - "modules/**"
      - "policies/**"

# ── Shared constants ────────────────────────────────────────────
env:
  TF_VERSION:       "1.9.8"
  CONFTEST_VERSION: "0.63.0"
  TF_WORKING_DIR:   environments/dev

# Cancel duplicate runs on the same PR to avoid state-lock races (Bug 1)
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

# ── Job ─────────────────────────────────────────────────────────
jobs:
  validate:
    name: "🔍 Validate & OPA"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write    # Needed to post the plan as a PR comment

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # ── Setup ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform & AWS
        uses: ./.github/actions/setup-terraform
        with:
          terraform-version:    ${{ env.TF_VERSION }}
          aws-access-key-id:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:           ${{ secrets.AWS_REGION }}

      # ── Static checks ──────────────────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate -no-color

      # ── Plan ───────────────────────────────────────────────────
      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -lock-timeout=60s \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt
        env:
          TF_VAR_environment: dev

      - name: Export plan as JSON
        run: terraform show -json tfplan > tfplan.json

      # ── OPA / Conftest ─────────────────────────────────────────
      # Enforces the 3 Rego rules (US 2.1 + US 2.2).
      # A non-zero exit code blocks the pipeline (US 3.1 acceptance criterion).
      - name: Install Conftest ${{ env.CONFTEST_VERSION }}
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v${{ env.CONFTEST_VERSION }}/conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz
          tar xzf conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run OPA Policies
        run: |
          conftest test tfplan.json \
            --policy ../../policies \
            --output table \
            --no-color 2>&1 | tee opa_output.txt

      # ── PR feedback ────────────────────────────────────────────
      - name: Post plan + OPA results as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8').slice(0, 60000);
            const opa  = fs.readFileSync('${{ env.TF_WORKING_DIR }}/opa_output.txt',  'utf8').slice(0, 10000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body: [
                '## 🏗️ Terraform Plan',
                '```hcl', plan, '```',
                '',
                '## 🔐 OPA Policy Results',
                '```', opa, '```',
              ].join('\n'),
            });

      # ── Artifact handoff to the deploy workflow ─────────────────
      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          retention-days: 1
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/tfplan.json
            ${{ env.TF_WORKING_DIR }}/plan_output.txt