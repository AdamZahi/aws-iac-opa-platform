AWSTemplateFormatVersion: "2010-09-09"
Description: >
  IAM NESTED STACK — IaC Comparison Project
  Least-privilege IAM roles and instance profiles consumed by downstream
  compute and pipeline stacks. Exports role ARNs via both Fn::Export and
  SSM Parameter Store for flexible cross-stack consumption.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Project Context"
        Parameters: [ProjectName, Environment]
      - Label:
          default: "EC2 Role Permissions"
        Parameters: [AllowS3Access, S3BucketArn]

Parameters:
  ProjectName:
    Type: String
    Default: iac-comparison
    AllowedPattern: "^[a-z][a-z0-9-]{1,28}[a-z0-9]$"

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  AllowS3Access:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Attach S3 read access to the EC2 instance role.

  S3BucketArn:
    Type: String
    Default: "arn:aws:s3:::placeholder"
    Description: >
      ARN of the S3 bucket the EC2 role is allowed to read.
      Only used when AllowS3Access=true.

Conditions:
  AttachS3Policy: !Equals [!Ref AllowS3Access, "true"]

Resources:

  # ── EC2 Instance Role ───────────────────────────────────────
  # Minimal trust policy: only EC2 can assume this role.
  # Permissions are additive; nothing is allowed by default.
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      # SSM Session Manager — replaces SSH; no port 22 needed
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-ec2-role"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # S3 read-only policy — conditionally attached
  EC2S3ReadPolicy:
    Type: AWS::IAM::Policy
    Condition: AttachS3Policy
    Properties:
      PolicyName: !Sub "${ProjectName}-${Environment}-ec2-s3-read"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3Read
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Ref S3BucketArn
              - !Sub "${S3BucketArn}/*"
      Roles:
        - !Ref EC2InstanceRole

  # CloudWatch agent policy — allow EC2 to push metrics/logs
  EC2CloudWatchPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ProjectName}-${Environment}-ec2-cloudwatch"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PushMetrics
            Effect: Allow
            Action:
              - cloudwatch:PutMetricData
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource: "*"
      Roles:
        - !Ref EC2InstanceRole

  # Instance Profile — wrapper required to attach a role to an EC2 instance
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectName}-${Environment}-ec2-profile"
      Roles:
        - !Ref EC2InstanceRole

  # ── CI/CD Deployment Role ────────────────────────────────────
  # Assumed by GitHub Actions / GitLab CI via OIDC (no long-lived keys).
  # Scoped to CFN stack operations on this project only.
  CICDDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-cicd-deploy-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              # GitHub Actions OIDC — replace with your org/repo
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                "token.actions.githubusercontent.com:sub": "repo:YOUR_ORG/YOUR_REPO:*"
      Policies:
        - PolicyName: CFNDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationDeploy
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                  - cloudformation:ListStackResources
                  - cloudformation:DetectStackDrift
                  - cloudformation:DescribeStackDriftDetectionStatus
                Resource: !Sub "arn:aws:cloudformation:*:${AWS::AccountId}:stack/${ProjectName}-${Environment}-*/*"
              - Sid: S3TemplateAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${ProjectName}-cfn-templates-*"
                  - !Sub "arn:aws:s3:::${ProjectName}-cfn-templates-*/*"
              - Sid: PassRoleToCloudFormation
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-${Environment}-cfn-exec-role"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-cicd-deploy-role"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ── CloudFormation Execution Role ────────────────────────────
  # CFN assumes this role when creating/updating resources.
  # Tighter than AdministratorAccess — scoped to needed services only.
  CFNExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-cfn-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CFNResourcePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: NetworkResources
                Effect: Allow
                Action:
                  - ec2:*Vpc*
                  - ec2:*Subnet*
                  - ec2:*Gateway*
                  - ec2:*RouteTable*
                  - ec2:*Route
                  - ec2:*SecurityGroup*
                  - ec2:*Address*
                  - ec2:*Tags*
                  - ec2:Describe*
                Resource: "*"
              - Sid: IAMResources
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:PassRole
                  - iam:GetRole
                  - iam:TagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${ProjectName}-*"
              - Sid: SSMParameters
                Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParameter
                  - ssm:AddTagsToResource
                Resource: !Sub "arn:aws:ssm:*:${AWS::AccountId}:parameter/${ProjectName}/*"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-cfn-exec-role"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ── SSM Parameters — publish role ARNs for cross-stack use ──
  # Downstream stacks can resolve these without knowing the IAM stack name.
  SSMParamEC2RoleArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${ProjectName}/${Environment}/iam/ec2-role-arn"
      Type: String
      Value: !GetAtt EC2InstanceRole.Arn
      Description: EC2 instance role ARN for cross-stack use
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

  SSMParamEC2ProfileArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${ProjectName}/${Environment}/iam/ec2-instance-profile-arn"
      Type: String
      Value: !GetAtt EC2InstanceProfile.Arn
      Description: EC2 instance profile ARN for cross-stack use
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

  SSMParamCFNExecRoleArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${ProjectName}/${Environment}/iam/cfn-exec-role-arn"
      Type: String
      Value: !GetAtt CFNExecutionRole.Arn
      Description: CloudFormation execution role ARN
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

Outputs:
  EC2InstanceRoleArn:
    Description: EC2 Instance Role ARN
    Value: !GetAtt EC2InstanceRole.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-EC2RoleArn"

  EC2InstanceProfileArn:
    Description: EC2 Instance Profile ARN
    Value: !GetAtt EC2InstanceProfile.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-EC2InstanceProfileArn"

  EC2InstanceProfileName:
    Description: EC2 Instance Profile Name (used in LaunchTemplate)
    Value: !Ref EC2InstanceProfile
    Export:
      Name: !Sub "${ProjectName}-${Environment}-EC2InstanceProfileName"

  CICDDeployRoleArn:
    Description: CI/CD deployment role ARN (for GitHub Actions OIDC)
    Value: !GetAtt CICDDeployRole.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-CICDDeployRoleArn"

  CFNExecutionRoleArn:
    Description: CloudFormation execution role ARN
    Value: !GetAtt CFNExecutionRole.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-CFNExecRoleArn"